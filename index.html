




<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>VP Task App</title>

    <style>
        body { font-family: Arial; padding: 20px; }
        input { margin: 5px 0; padding: 5px; }
        button { margin: 5px 5px 5px 0; padding: 5px 10px; }
        .task { margin: 8px 0; }
    </style>
</head>

<body>

<!-- AUTH SECTION -->
<div id="authSection">
    <h2>Login</h2>
    <input id="email" placeholder="email"><br>
    <input id="password" type="password" placeholder="password"><br>
    <button onclick="login()">Login</button>
</div>

<!-- APP SECTION -->
<div id="appSection" style="display:none;">

    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2>VP Task Dashboard</h2>
        <button onclick="logout()">Logout</button>
    </div>

    <hr>

    <h3>Create Task</h3>
    <input id="taskInput" placeholder="task title">
    <button onclick="createTask()">Add Task</button>

    <h3>Filters</h3>
    <button onclick="filterTasks('all')">All</button>
    <button onclick="filterTasks('active')">Active</button>
    <button onclick="filterTasks('completed')">Completed</button>

    <h3>Your Tasks</h3>
    <div id="tasks"></div>
</div>

<script>
let token = localStorage.getItem("token") || "";
let allTasks = [];

/* UI */
function showApp() {
    document.getElementById("authSection").style.display = "none";
    document.getElementById("appSection").style.display = "block";
}

function showAuth() {
    document.getElementById("authSection").style.display = "block";
    document.getElementById("appSection").style.display = "none";
}

/* LOGIN */
async function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const res = await fetch("http://localhost:3000/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (data.token) {
        token = data.token;
        localStorage.setItem("token", token);
        showApp();
        loadTasks();
    } else {
        alert("Login failed");
    }
}

/* LOGOUT */
function logout() {
    localStorage.removeItem("token");
    token = "";
    allTasks = [];
    document.getElementById("tasks").innerHTML = "";
    showAuth();
}

/* LOAD TASKS */
async function loadTasks() {
    if (!token) return;

    document.getElementById("tasks").innerHTML = "Loading...";

    const res = await fetch("http://localhost:3000/tasks", {
        headers: { Authorization: token }
    });

    const data = await res.json();

    allTasks = Array.isArray(data) ? data : [];

    renderTasks(allTasks);
}

/* RENDER */
function renderTasks(tasks) {
    const container = document.getElementById("tasks");
    container.innerHTML = "";

    tasks.forEach(task => {
        const div = document.createElement("div");
        div.className = "task";

        div.innerHTML = `
    ${task.title} (${task.completed ? "✔" : "❌"})
    <button onclick="toggleTask('${task._id}')">Toggle</button>
    <button onclick="editTask('${task._id}')">Edit</button>
    <button onclick="deleteTask('${task._id}')">Delete</button>
`;

        container.appendChild(div);
    });
}

/* CREATE */
async function createTask() {
    const title = document.getElementById("taskInput").value.trim();

    if (!title) return alert("Task cannot be empty");

    await fetch("http://localhost:3000/tasks", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            Authorization: token
        },
        body: JSON.stringify({ title })
    });

    document.getElementById("taskInput").value = "";
    loadTasks();
}

/* TOGGLE */
async function toggleTask(id) {
    await fetch(`http://localhost:3000/tasks/${id}`, {
        method: "PUT",
        headers: { Authorization: token }
    });

    loadTasks();
}

/* DELETE */
async function deleteTask(id) {
    await fetch(`http://localhost:3000/tasks/${id}`, {
        method: "DELETE",
        headers: { Authorization: token }
    });

    loadTasks();
}

/* EDIT */
async function editTask(id) {
    const newTitle = prompt("Edit task:");

    if (!newTitle) return;

    await fetch(`http://localhost:3000/tasks/${id}`, {
        method: "PATCH",
        headers: {
            "Content-Type": "application/json",
            Authorization: token
        },
        body: JSON.stringify({ title: newTitle })
    });

    loadTasks();
}

/* FILTER */
function filterTasks(type) {
    if (type === "active") {
        renderTasks(allTasks.filter(t => !t.completed));
    } else if (type === "completed") {
        renderTasks(allTasks.filter(t => t.completed));
    } else {
        renderTasks(allTasks);
    }
}

/* INIT */
function init() {
    if (token) {
        showApp();
        loadTasks();
    } else {
        showAuth();
    }
}

init();
</script>

</body>
</html>
