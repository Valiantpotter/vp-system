




<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>VP Task App</title>

    <style>
        body {
            font-family: Arial;
            background: #f2f4f8;
            margin: 0;
            padding: 0;
        }

        .header {
            position: sticky;
            top: 0;
            background: white;
            padding: 15px;
            font-weight: bold;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }

        .container {
            max-width: 420px;
            margin: auto;
            padding: 15px;
        }

        .card {
            background: white;
            padding: 15px;
            margin: 10px 0;
            border-radius: 12px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 6px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            padding: 8px 12px;
            margin: 4px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
        }

        .task {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .completed {
            text-decoration: line-through;
            color: gray;
            opacity: 0.6;
        }

        .filters {
            text-align: center;
            margin: 10px 0;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
    </style>
</head>

<body>

<div class="header">VP TASK APP</div>

<div class="container">

    <div class="card">
        <div class="topbar">
            <h3>Tasks</h3>
            <button onclick="logout()">Logout</button>
        </div>
    </div>

    <div class="card">
        <h3>Login</h3>
        <input id="email" placeholder="email">
        <input id="password" type="password" placeholder="password">
        <button onclick="login()">Login</button>
    </div>

    <div class="card">
        <h3>Create Task</h3>
        <input id="taskTitle" placeholder="task title" onkeyup="checkInput()">
        <button id="addBtn" onclick="createTask()" disabled>Add Task</button>
    </div>

    <div class="card filters">
        <button onclick="setFilter('all')">All</button>
        <button onclick="setFilter('active')">Active</button>
        <button onclick="setFilter('completed')">Completed</button>
    </div>

    <div class="card">
        <h3>Your Tasks</h3>
        <ul id="taskList"></ul>
    </div>

</div>

<script>
let token = localStorage.getItem("token") || "";
let currentFilter = "all";

if (token) {
    getTasks();
}

/* LOGIN */
async function login() {
    try {
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;

        const res = await fetch("https://vp-system-ru5o.onrender.com/auth/login", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (data.token) {
            token = data.token;
            localStorage.setItem("token", token);

            alert("Login successful");
            getTasks();
        } else {
            alert(data.message || data.error || "Login failed");
        }

    } catch (err) {
        alert("ERROR: " + err.message);
    }
}

/* LOGOUT */
function logout() {
    token = "";
    localStorage.removeItem("token");

    document.getElementById("taskList").innerHTML = "";
    document.getElementById("email").value = "";
    document.getElementById("password").value = "";

    alert("Logged out");
}

/* CREATE TASK */
async function createTask() {
    const input = document.getElementById("taskTitle");
    const title = input.value.trim();

    if (!title) return;

    await fetch("https://vp-system-ru5o.onrender.com/tasks", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token
        },
        body: JSON.stringify({ title })
    });

    input.value = "";
    checkInput();
    getTasks();
}

/* INPUT CHECK */
function checkInput() {
    const val = document.getElementById("taskTitle").value;
    document.getElementById("addBtn").disabled = val.trim() === "";
}

/* FILTER */
function setFilter(filter) {
    currentFilter = filter;
    getTasks();
}

/* GET TASKS */
async function getTasks() {
    const list = document.getElementById("taskList");

    list.innerHTML = "<li>Loading tasks...</li>";

    try {
        const res = await fetch("https://vp-system-ru5o.onrender.com/tasks", {
            headers: {
                "Authorization": "Bearer " + token
            }
        });

        const tasks = await res.json();

        list.innerHTML = "";

        let filtered = tasks;

        if (currentFilter === "active") {
            filtered = tasks.filter(t => t.status !== "completed");
        }

        if (currentFilter === "completed") {
            filtered = tasks.filter(t => t.status === "completed");
        }

filtered.forEach(task => {
    const li = document.createElement("li");

    const wrapper = document.createElement("div");
    wrapper.className = "task";

    const title = document.createElement("span");
    title.textContent = `${task.title} (${task.status})`;

    if (task.status === "completed") {
        title.classList.add("completed");
    }

    const buttons = document.createElement("div");

    const delBtn = document.createElement("button");
    delBtn.textContent = "❌";
    delBtn.onclick = () => deleteTask(task._id);

    const editBtn = document.createElement("button");
    editBtn.textContent = "✏";
    editBtn.onclick = () => editTask(task._id, task.title);

    buttons.appendChild(delBtn);
    buttons.appendChild(editBtn);

    wrapper.appendChild(title);
    wrapper.appendChild(buttons);
    li.appendChild(wrapper);

    list.appendChild(li);
});
    } catch (err) {
        list.innerHTML = "<li style='color:red;'>Error loading tasks</li>";
    }
}

/* COMPLETE TASK */
async function completeTask(id) {
    await fetch(`https://vp-system-ru5o.onrender.com/tasks/${id}`, {
        method: "PUT",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token
        },
        body: JSON.stringify({ status: "completed" })
    });

    getTasks();
}

/* DELETE TASK */
async function deleteTask(id) {
    await fetch(`https://vp-system-ru5o.onrender.com/tasks/${id}`, {
        method: "DELETE",
        headers: {
            "Authorization": "Bearer " + token
        }
    });

    getTasks();
}

/* EDIT TASK */
async function editTask(id, oldTitle) {
    const newTitle = prompt("Edit task:", oldTitle);
    if (!newTitle) return;

    try {
        await fetch(`https://vp-system-ru5o.onrender.com/tasks/${id}`, {
            method: "PUT",
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + token
            },
            body: JSON.stringify({ title: newTitle })
        });

        getTasks();

    } catch (err) {
        alert("Failed to edit task");
    }
}
</script>

</body>
</html>
