


<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>VP Task App</title>

<style>
body {
    font-family: Arial;
    padding: 20px;
}

input {
    margin: 5px 0;
    padding: 6px;
}

button {
    margin: 5px 5px 5px 0;
    padding: 6px 10px;
    cursor: pointer;
}

.task {
    margin: 8px 0;
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 6px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
}

.task span {
    flex: 1;
}
</style>
</head>

<body>

<!-- AUTH -->
<div id="authSection">
    <h2>Login</h2>
    <input id="email" placeholder="email"><br>
    <input id="password" type="password" placeholder="password"><br>
    <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="appSection" style="display:none;">
    <div style="display:flex; justify-content:space-between;">
        <h2>VP Task App</h2>
        <button onclick="logout()">Logout</button>
    </div>

    <hr>

    <h3>Create Task</h3>
    <input id="taskInput" placeholder="task title">
    <button onclick="createTask()">Add</button>

    <h3>Your Tasks</h3>
    <div id="tasks"></div>
</div>

<script>
const API = "https://vp-system-1.onrender.com";

let token = localStorage.getItem("token");
let tasksCache = [];

/* INIT */
window.onload = () => {
    token = localStorage.getItem("token");

    console.log("TOKEN ON LOAD:", token);

    if (token && token !== "undefined") {
        showApp();
        loadTasks();
    } else {
        showAuth();
    }
};

/* UI */
function showApp() {
    authSection.style.display = "none";
    appSection.style.display = "block";
}

function showAuth() {
    authSection.style.display = "block";
    appSection.style.display = "none";
}

/* LOGIN */
async function login() {
    const res = await fetch(`${API}/login`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            email: email.value,
            password: password.value
        })
    });

    const data = await res.json();

    if (data.token) {
        token = data.token;
        localStorage.setItem("token", token);
        showApp();
        loadTasks();
    } else {
        alert(data.error || "Login failed");
    }
}

/* LOGOUT */
function logout() {
    localStorage.removeItem("token");
    token = null;
    tasksCache = [];
    renderTasks([]);
    showAuth();
}

/* LOAD TASKS */
async function loadTasks() {
    const res = await fetch(`${API}/tasks`, {
        headers: { Authorization: `Bearer ${token}` }
    });

    const data = await res.json();


    console.log("TASK RESPONSE:", data);

    if (!res.ok) {
        console.log("Task load failed:", data);
        tasksCache = [];
        renderTasks([]);
        return;
    }

    const tasks = Array.isArray(data) ? data : data.tasks;

    if (!Array.isArray(tasks)) {
        tasksCache = [];
        renderTasks([]);
        return;
    }

    tasksCache = tasks;
    renderTasks(tasksCache);
}

/* CREATE */
async function createTask() {
    const title = taskInput.value.trim();
    if (!title) return;

    taskInput.value = "";

    const temp = {
        _id: Date.now().toString(),
        title,
        completed: false
    };

    tasksCache.unshift(temp);
    renderTasks(tasksCache);

    const res = await fetch(`${API}/tasks`, {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${token}`
        },
        body: JSON.stringify({ title })
    });

    const saved = await res.json();

    tasksCache = tasksCache.map(t =>
        t._id === temp._id
            ? {
                _id: saved._id || temp._id,
                title: saved.title || saved.text || title,
                completed: saved.completed ?? false
            }
            : t
    );

    renderTasks(tasksCache);
}

/* DELETE */
async function deleteTask(id) {
    await fetch(`${API}/tasks/${id}`, {
        method: "DELETE",
        headers: { Authorization: `Bearer ${token}` }
    });

    tasksCache = tasksCache.filter(t => t._id !== id);
    renderTasks(tasksCache);
}

/* TOGGLE */
async function toggleTask(id) {
    await fetch(`${API}/tasks/${id}`, {
        method: "PUT",
        headers: { Authorization: `Bearer ${token}` }
    });

    tasksCache = tasksCache.map(t =>
        t._id === id ? { ...t, completed: !t.completed } : t
    );

    renderTasks(tasksCache);
}

/* SAFE TITLE */
function getTitle(task) {
    return task.title || task.text || "Untitled";
}

/* RENDER */
function renderTasks(tasks) {
    const container = document.getElementById("tasks");
    container.innerHTML = "";

    tasks.forEach(task => {
        const div = document.createElement("div");
        div.className = "task";

        div.innerHTML = `
            <span onclick="toggleTask('${task._id}')"
                style="text-decoration:${task.completed ? 'line-through' : 'none'}">
                ${getTitle(task)}
            </span>

            <button onclick="deleteTask('${task._id}')">delete</button>
        `;

        container.appendChild(div);
    });
}
</script>

</body>
</html>
